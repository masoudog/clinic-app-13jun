version: 1
applications:
  - appRoot: ./
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run type-check
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
          - .next/standalone/**/*
      buildSpec:
        # Amplify uses Node 18 by default; specify if needed
        version: 0.1
